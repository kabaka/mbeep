name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '31 3 * * 1'

jobs:
  analyze:
    name: Analyze (C/C++)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenAL
        run: sudo apt-get update && sudo apt-get install -y libopenal-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-and-quality
          # Emit both code-scanning (security) and code-quality results so the
          # repository ruleset's code-scanning and code-quality rules are both
          # satisfied. `analysis-kinds` is a preview input; if Code Quality is
          # not yet enabled for the repo, enable it under
          # Settings -> Code security -> Code Quality.
          analysis-kinds: code-scanning,code-quality

      - name: Build
        run: make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
