name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenAL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenal-dev

      - name: Build with strict warnings
        run: make CFLAGS="-Wall -Wextra -Werror -std=c99"

      # Headless .wav-generation tests only; the audio-device playback path is
      # exercised in the coverage job below against openal-soft's null backend.
      - name: Run test suite
        run: make test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenal-dev gcovr

      # Builds instrumented, runs the full suite against openal-soft's null
      # backend, and fails if line coverage drops below 80%. (GitHub's native
      # Code Quality coverage does not support C/C++, so we gate here directly.)
      - name: Build with coverage and enforce threshold
        run: make coverage

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
